<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 창</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <main class="main-content">
        <div class="login-box">
            <div class="login-text">
                <a href="index.html">
                    <img 
                    src='https://i.postimg.cc/htrdm6VM/Pay-Lens-logo.png'
                    style="height: 42px; width: auto;"
                    fetchpriority="high"
                    alt="PayLens 로고"
                    />
                </a>
                <h2 style="margin-top: 8px; font-size: 24px;">안전한 로그인</h2>
                <p style="color: #94A3B8; margin-top: 4px; font-size: 16px;">급여 보호를 위한 첫걸음</p>
            </div>
            <div class="login-button">
                <button class="btn-google">
                    <svg class="btn-icon google-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    </svg>
                    Google 계정으로 로그인
                </button>
                <button class="btn-kakao">
                    <svg class="btn-icon kakao-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 3c-5.523 0-10 3.51-10 7.838 0 2.805 1.83 5.253 4.606 6.643l-1.18 4.316c-.058.21.196.386.376.25l5.05-3.328c.376.046.76.07 1.148.07 5.523 0 10-3.51 10-7.84C22 6.51 17.523 3 12 3z"/>
                    </svg>
                    카카오 계정으로 로그인
                </button>
            </div>
        </div>
    </main>
</body>
</html>
