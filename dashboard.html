<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대쉬보드 뼈대</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <!-- 사이드바 구역 -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="https://i.postimg.cc/htrdm6VM/Pay-Lens-logo.png" 
            alt="PayLens 로고"
            class="logo-img"
            fetchpriority="high"
            >
        </div>
        <p class="logo-subtitle">Wage Protection</p>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="analysis.html">Wage Analysis</a>
            <a href="#">Documents</a>
            <a href="#">Expert Finder</a>
            <a href="#">My Page</a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="dashboard-header">
            <h2>대시보드</h2>
            <p>급여 명세서를 업로드하고 임금 보호 상태를 확인하세요.</p>
        </div>

        <!-- 파일 업로드 구역 -->
        <div class="upload-card">
            <h3 class="card-title">새 문서 분석</h3>
            
            <div class="upload-area">
                <!-- 아이콘 (일단 이모지로 대체, 나중에 이미지로 변경 가능) -->
                <div class="upload-icon">📄</div>
                
                <p class="upload-title">여기로 파일을 드래그하세요</p>
                <p class="upload-subtitle">또는 클릭하여 급여 명세서(PDF, JPG)를 선택하세요</p>

                <input type="file" id="file-upload" class="file-input" accept=".pdf, .jpg, .jpeg">
                <label for="file-upload" class="upload-btn">파일 선택하기</label>
            </div>
        </div>
    </main>
</body>
</html>
